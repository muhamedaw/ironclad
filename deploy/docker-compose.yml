# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Ironclad — Full-stack docker-compose
#
# Profiles:
#   local      → frontend + api + checkout + mysql + redis (dev/staging)
#   production → api + checkout + mysql only (frontend on Vercel)
#
# Usage:
#   docker compose --profile local up          # full local stack
#   docker compose --profile production up -d  # production services
#   docker compose up mysql redis -d            # only infra
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── MySQL 8.0 ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    <<: [*restart, *logging]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-ironclad_db}
      MYSQL_USER:          ${MYSQL_USER:-ironclad}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/sample_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./docker/mysql.cnf:/etc/mysql/conf.d/ironclad.cnf:ro
    ports:
      - "${MYSQL_EXPOSED_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - backend

  # ── Redis (session cache + recommendation cache) ───────────────────
  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXPOSED_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # ── API Service ───────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: ../docker/Dockerfile.api
    <<: [*restart, *logging]
    depends_on:
      mysql: { condition: service_healthy }
      redis:  { condition: service_healthy }
    environment:
      NODE_ENV:             production
      PORT:                 4000
      DB_HOST:              mysql
      DB_PORT:              3306
      DB_NAME:              ${MYSQL_DATABASE:-ironclad_db}
      DB_USER:              ${MYSQL_USER:-ironclad}
      DB_PASSWORD:          ${MYSQL_PASSWORD}
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      FRONTEND_URL:         ${FRONTEND_URL}
      LOG_LEVEL:            ${LOG_LEVEL:-info}
    ports:
      - "${API_EXPOSED_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend
      - frontend

  # ── Checkout / Payment Service ────────────────────────────────────
  checkout:
    build:
      context: ./checkout-service
      dockerfile: ../docker/Dockerfile.checkout
    <<: [*restart, *logging]
    depends_on:
      mysql: { condition: service_healthy }
    environment:
      NODE_ENV:                 production
      PORT:                     4002
      DB_HOST:                  mysql
      DB_PORT:                  3306
      DB_NAME:                  ${MYSQL_DATABASE:-ironclad_db}
      DB_USER:                  ${MYSQL_USER:-ironclad}
      DB_PASSWORD:              ${MYSQL_PASSWORD}
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:    ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLISHABLE_KEY:   ${STRIPE_PUBLISHABLE_KEY}
      PAYPAL_CLIENT_ID:         ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET:     ${PAYPAL_CLIENT_SECRET}
      PAYPAL_ENV:               ${PAYPAL_ENV:-sandbox}
      FRONTEND_ORIGIN:          ${FRONTEND_URL}
      LOG_LEVEL:                ${LOG_LEVEL:-info}
    ports:
      - "${CHECKOUT_EXPOSED_PORT:-4002}:4002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend
      - frontend

  # ── Frontend (local/staging only — prod uses Vercel) ──────────────
  frontend:
    profiles: ["local"]
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        VITE_API_URL:                ${VITE_API_URL:-http://localhost:4000}
        VITE_CHECKOUT_URL:           ${VITE_CHECKOUT_URL:-http://localhost:4002}
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
        VITE_YOUTUBE_API_KEY:        ${VITE_YOUTUBE_API_KEY}
    <<: [*restart, *logging]
    ports:
      - "3000:80"
    depends_on:
      api:      { condition: service_healthy }
      checkout: { condition: service_healthy }
    networks:
      - frontend

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
