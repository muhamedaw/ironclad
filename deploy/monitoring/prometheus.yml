# monitoring/prometheus.yml
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service:     ironclad

scrape_configs:

  - job_name: ironclad-api
    static_configs:
      - targets: ['api:4000']
    metrics_path: /api/v1/metrics
    scrape_interval: 15s

  - job_name: ironclad-checkout
    static_configs:
      - targets: ['checkout:4002']
    metrics_path: /api/v1/metrics
    scrape_interval: 15s

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: mysql-exporter
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
