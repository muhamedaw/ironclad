name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        working-directory: api
        run: npm ci
      - name: Run tests
        working-directory: api
        run: npm test
        env:
          NODE_ENV: test
          LOG_LEVEL: error

  test-recommendations:
    name: Recommendations Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: recommendations/package-lock.json
      - name: Install dependencies
        working-directory: recommendations
        run: npm ci
      - name: Run tests
        working-directory: recommendations
        run: npm test
        env:
          NODE_ENV: test
          LOG_LEVEL: error

  build-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000
          VITE_CHECKOUT_URL: http://localhost:4002
