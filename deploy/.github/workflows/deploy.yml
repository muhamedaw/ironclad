# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
# Ironclad CI/CD Pipeline
#
# Triggers:
#   push main → full deploy (test → build → deploy)
#   pull_request → lint + test only
#
# Secrets required (set in GitHub repo Settings → Secrets):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   RENDER_API_KEY, RENDER_API_SERVICE_ID, RENDER_CHECKOUT_SERVICE_ID
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (optional, for Docker Hub push)
#   SNYK_TOKEN (optional, for security scanning)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Ironclad

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint & Test (runs on every push / PR) ─────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: ironclad_test
          MYSQL_USER: ironclad
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # ── API tests ────────────────────────────────────────────────
      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Run API tests
        working-directory: api
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: ironclad_test
          DB_USER: ironclad
          DB_PASSWORD: testpass
          JWT_SECRET: test-secret-not-for-production
          JWT_REFRESH_SECRET: test-refresh-secret
          LOG_LEVEL: error
        run: npm test

      # ── Checkout service tests ───────────────────────────────────
      - name: Install checkout dependencies
        working-directory: checkout-service
        run: npm ci

      - name: Run checkout tests
        working-directory: checkout-service
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: ironclad_test
          DB_USER: ironclad
          DB_PASSWORD: testpass
          STRIPE_SECRET_KEY: sk_test_placeholder
          LOG_LEVEL: error
        run: npm test

      # ── Frontend type-check + lint ───────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend type-check
        working-directory: frontend
        run: npm run type-check --if-present

      # ── Upload coverage (optional) ───────────────────────────────
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false


  # ── Job 2: Security scan ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Audit API dependencies
        working-directory: api
        run: npm audit --audit-level=high
        continue-on-error: true   # Warn, don't block deploy for now

      - name: Audit checkout dependencies
        working-directory: checkout-service
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true


  # ── Job 3: Build & push Docker images ────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ironclad
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./docker/Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ironclad-api:latest,${{ secrets.DOCKERHUB_USERNAME }}/ironclad-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Checkout image
        uses: docker/build-push-action@v5
        with:
          context: ./checkout-service
          file: ./docker/Dockerfile.checkout
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ironclad-checkout:latest,${{ secrets.DOCKERHUB_USERNAME }}/ironclad-checkout:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max


  # ── Job 4: Deploy frontend to Vercel ─────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: frontend

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Frontend deployed to: ${{ steps.deploy.outputs.url }}`
            })


  # ── Job 5: Deploy backends to Render ─────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy — API
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_API_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"imageUrl": "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ironclad-api:sha-${{ github.sha }}"}'

      - name: Trigger Render deploy — Checkout
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_CHECKOUT_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"imageUrl": "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ironclad-checkout:sha-${{ github.sha }}"}'

      - name: Wait for Render deployments
        run: sleep 60   # Give Render time to start; improve with polling

      - name: Smoke test API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.ironclad-parts.com/api/v1/health)
          if [ "$STATUS" != "200" ]; then echo "API health check failed: $STATUS"; exit 1; fi
          echo "✓ API healthy"

      - name: Smoke test Checkout
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://checkout.ironclad-parts.com/api/v1/health)
          if [ "$STATUS" != "200" ]; then echo "Checkout health check failed: $STATUS"; exit 1; fi
          echo "✓ Checkout healthy"


  # ── Job 6: Run DB migrations after successful deploy ─────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          NODE_ENV: production
        run: node scripts/migrate.js
        working-directory: api
